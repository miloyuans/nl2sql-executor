openapi: 3.0.3
info:
  title: NL2SQL Executor API
  version: 1.0.0
paths:
  /v1/query-jobs:
    post:
      summary: Submit async SQL query job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chat_id, sql]
              properties:
                request_id: {type: string}
                user_id: {type: string}
                chat_id: {type: string}
                session_id: {type: string}
                question: {type: string}
                data_source_id: {type: string}
                sql: {type: string}
                chart_hint:
                  type: object
                  properties:
                    type: {type: string}
                    x: {type: string}
                    y: {type: array, items: {type: string}}
                    series: {type: string}
      responses:
        '202':
          description: queued
  /v1/jobs/{job_id}:
    get:
      summary: Get job status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema: {type: string}
      responses:
        '200': {description: job}
  /v1/datasources:
    get:
      summary: List datasource status
      security:
        - bearerAuth: []
      responses:
        '200': {description: datasource status}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
