apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nl2sql-executor
  namespace: nl2sql
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - host: nl2sql-executor.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nl2sql-executor
                port:
                  number: 8088
  # tls:
  #   - hosts:
  #       - nl2sql-executor.example.com
  #     secretName: nl2sql-executor-tls
